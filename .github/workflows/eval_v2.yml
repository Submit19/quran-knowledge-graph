# Eval v2 — INFORMATIONAL ONLY in Phase 4a.
#
# Promoted to a merge gate in Phase 4d after the production 50q
# set is authored (Phase 4b) and the judge is calibrated against
# human ratings (Phase 4c). See docs/EVAL_V2_RUNNER.md for the
# Phase 4 roadmap.
#
# Phase 4a constraints:
#   * No Neo4j in CI yet → the smoke step uses an inline stub agent
#     so the runner contract is exercised end-to-end without external
#     services. Real eval (against Neo4j + Anthropic) is operator-run
#     locally via `python scripts/eval_v2.py --questions ... --output ...`.
#   * ANTHROPIC_API_KEY is optional. The judge backend falls back to
#     `stub` when the secret is not configured — no missing-secret
#     failures, just a clear "judge skipped" notice in the artifact.

name: eval-v2

on:
  push:
    branches:
      - main
      - 'phase-*'
      - 'phase-4*'
  pull_request:
    branches:
      - main

jobs:
  eval-v2-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml numpy pytest

      - name: Validate question schema
        run: |
          python <<'PY'
          import sys
          from pathlib import Path
          import yaml

          path = Path("data/eval/v2/examples.yaml")
          questions = yaml.safe_load(path.read_text(encoding="utf-8"))
          assert isinstance(questions, list), f"{path}: expected a YAML list"
          assert len(questions) >= 1, f"{path}: expected at least one question"

          required = {"id", "bucket", "question", "rubric_weights"}
          buckets = {"STRUCTURED", "ABSTRACT", "CONCRETE", "BROAD", "ARABIC"}
          for q in questions:
              missing = required - set(q.keys())
              assert not missing, f"{q.get('id')}: missing fields {missing}"
              assert q["bucket"] in buckets, f"{q['id']}: bad bucket {q['bucket']}"
              total = sum(float(v) for v in q["rubric_weights"].values())
              assert 0.99 <= total <= 1.01, (
                  f"{q['id']}: rubric_weights sum to {total:.3f}, not 1.0"
              )
          print(f"[validate] OK — {len(questions)} questions in {path}")
          PY

      - name: Smoke eval (stub agent + judge backend)
        env:
          # ANTHROPIC_API_KEY is optional. If unset, judge_caller falls
          # back to the stub backend and the artifact records score=0
          # with a "judge skipped" justification. CI still passes.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p data/eval/v2/runs
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::notice::ANTHROPIC_API_KEY not configured — judge backend will use stub. This is expected in Phase 4a."
            JUDGE_BACKEND=stub
          else
            JUDGE_BACKEND=anthropic
          fi
          JUDGE_BACKEND="${JUDGE_BACKEND}" python <<'PY'
          import asyncio
          import json
          import os
          import sys
          from pathlib import Path

          import yaml

          sys.path.insert(0, ".")

          from eval.v2.agent_caller import TrajectoryResult
          from eval.v2.judge import make_judge_caller
          from eval.v2.runner import run_eval

          questions = yaml.safe_load(
              Path("data/eval/v2/examples.yaml").read_text(encoding="utf-8")
          )

          # Stub agent: returns an empty trajectory. Phase 4a validates
          # the runner contract; real agent runs require Neo4j and are
          # operator-triggered locally.
          async def stub_agent(question: str) -> TrajectoryResult:
              return TrajectoryResult(
                  answer_text="(stub agent — CI cannot reach Neo4j in Phase 4a)",
                  tool_calls=[],
                  citations=[],
                  sse_events=[],
              )

          judge_backend = os.environ.get("JUDGE_BACKEND", "stub")
          judge_caller = make_judge_caller(backend=judge_backend)

          output_path = Path("data/eval/v2/runs/ci_smoke.json")
          aggregated = asyncio.run(
              run_eval(
                  questions,
                  agent_caller=stub_agent,
                  judge_caller=judge_caller,
                  output_path=output_path,
              )
          )
          print("[smoke] aggregated:")
          print(json.dumps(aggregated, indent=2))
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-v2-smoke-result
          path: data/eval/v2/runs/ci_smoke.json
          retention-days: 30

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'data/eval/v2/runs/ci_smoke.json';
            if (!fs.existsSync(path)) {
              core.warning(`No ${path} — smoke step must have failed; skipping PR comment.`);
              return;
            }
            const data = JSON.parse(fs.readFileSync(path, 'utf-8'));
            const agg = data.aggregated;
            const fmt = (s) => `${s.mean.toFixed(2)} (95% CI ${s.ci_lower.toFixed(2)}–${s.ci_upper.toFixed(2)}, n=${s.n})`;
            const bucketRows = Object.entries(agg.by_bucket)
              .map(([b, s]) => `| ${b} | ${fmt(s)} |`)
              .join('\n');
            const dimRows = Object.entries(agg.by_dimension)
              .map(([d, s]) => `| ${d} | ${fmt(s)} |`)
              .join('\n');
            const body = [
              '### Eval v2 — Phase 4a smoke result (informational)',
              '',
              '> Phase 4a uses a **stub agent** and judges via the configured backend.',
              '> Real eval (against Neo4j + Anthropic) is operator-run locally.',
              '> Gating activates in Phase 4d after questions are authored (4b) and the judge is calibrated (4c).',
              '',
              `**Overall:** ${fmt(agg.overall)}`,
              `**Hard assert pass rate:** ${agg.hard_assert_pass_rate}`,
              '',
              '**Per bucket:**',
              '',
              '| Bucket | Weighted score |',
              '| --- | --- |',
              bucketRows,
              '',
              '**Per dimension:**',
              '',
              '| Dimension | Score |',
              '| --- | --- |',
              dimRows,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
