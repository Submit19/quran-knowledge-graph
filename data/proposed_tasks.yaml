# Pending task proposals — researcher writes here, orchestrator reviews.
#
# Researcher (research-tick subagent) appends new proposals to `pending` when
# a research finding is actionable. These tasks DO NOT go straight into
# ralph_backlog.yaml — they wait here for orchestrator review.
#
# Orchestrator (IMPL-tick subagent) reviews this file at the START of each
# IMPL tick before picking task work. For each pending entry:
#   - APPROVE  → move to ralph_backlog.yaml `tasks:` list, remove from here.
#   - REJECT   → move to `rejected:` block here with a one-line reason.
#   - DEFER    → leave in pending; bump `seen_count` so we know how many
#                review cycles it survived.
#
# Every 6th IMPL tick (i.e. roughly every 12h at hourly cadence) the
# orchestrator does a fuller maintenance pass: dedupes overlapping tasks
# in ralph_backlog.yaml, retires obsoleted ones (with rationale), rebalances
# priorities based on what's been done.
#
# Schema:
#   pending:
#     - proposed_at: <ISO timestamp>
#       proposed_by: <research_topic_id or research tick reference>
#       seen_count: 0
#       task:
#         id: from_research_<short>
#         type: cleanup | agent_creative | cypher_analysis
#         priority: 40-70   (gets re-ranked by orchestrator)
#         description: "[from-research] ..."
#         spec: { ... }
#
#   rejected:
#     - rejected_at: <ISO timestamp>
#       reason: <one line>
#       task_id: <id>
#       proposed_by: <source>

version: 1
pending:
  - proposed_at: "2026-05-11T00:00:00+00:00"
    proposed_by: "research:blog_neo4j:introducing-create-context-graph"
    seen_count: 0
    task:
      id: from_blog_extend_reasoning_memory_confidence
      type: agent_creative
      priority: 62
      description: "[from-research] Extend reasoning_memory.py to store `thought` and `confidence` properties on TraceStep/ToolCall nodes, aligned with Neo4j Context Graph decision-trace pattern. This makes reasoning traces auditable and replayable."
      spec:
        details: |
          Neo4j Labs' Create Context Graph paper shows thought→action→observation chains with
          confidence scores (0.0–1.0) on each step. Our reasoning_memory.py already writes
          :ReasoningTrace → :ToolCall subgraphs but lacks:
            1. A `thought` string property (the model's rationale before the tool call)
            2. A `confidence` float (estimated reliability of this step)
          Changes: update reasoning_memory.py write_tool_call() to accept and store these
          optional fields; update chat.py to pass them where available from tool-use response.
        acceptance:
          - file_exists: data/ralph_agent_from_blog_extend_reasoning_memory_confidence.md
          - file_min_bytes: {path: data/ralph_agent_from_blog_extend_reasoning_memory_confidence.md, min: 600}
rejected: []
