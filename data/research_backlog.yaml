# Research backlog — feeds the parallel research loop.
# Each entry is one research direction. The loop picks the highest-priority
# open one each cycle, spawns a subagent to investigate, writes findings to
# data/research_<id>.md, and (if the finding is actionable) appends a new
# task to ralph_backlog.yaml tagged [from-research].
#
# Format:
#   - id: short_snake_case
#     priority: 0-100
#     status: open | in_progress | done
#     question: the actual research question
#     deliverable: what the writeup should produce
#     tags: [retrieval, arabic, neo4j, eval, ...]

version: 1

topics:
  # ── Retrieval & embeddings ────────────────────────────────────────────
  - id: bge_m3_dense_vs_colbert
    priority: 80
    status: done
    question: BGE-M3 supports dense, sparse, and ColBERT (multi-vector) retrieval. Has anyone benchmarked its colbert mode on Quranic / classical-Arabic corpora? Is the latency worth it over our current dense-only setup?
    deliverable: Pros/cons summary + recommendation (skip / try / try with caveats), 5-paper bibliography, sample code if applicable.
    tags: [retrieval, embeddings]
    decision: SKIP — see data/research_bge_m3_dense_vs_colbert.md. Only +1.2 nDCG@10 lift expected; cross-encoder rerank already provides late-interaction-like quality. Domain adaptation (fine-tune dense) is the higher-leverage move.
    promoted_task: from_research_finetune_bge_m3_qrcd

  - id: arabic_dense_retrievers_2025
    priority: 78
    status: open
    question: What are the current best open Arabic-aware embedding models in 2025-2026 beyond BGE-M3? Look at AraBERT-v3, ArabicBERT, Marbert, Jina-embeddings-v3, multilingual-e5-large-instruct.
    deliverable: Comparison table on classical-Arabic / religious text retrieval. Specific recommendation for our Hafs corpus.
    tags: [retrieval, arabic, embeddings]

  - id: hybrid_rrf_alternatives
    priority: 70
    status: open
    question: Beyond reciprocal rank fusion (k=60), what's the state of art in hybrid BM25+dense fusion? Look at convex combination tuning, weighted RRF, learned fusion.
    deliverable: Practical recipe we can swap into chat.tool_hybrid_search and a/b against current RRF.
    tags: [retrieval, eval]

  - id: rerank_dropin_2026
    priority: 68
    status: open
    question: Beyond bge-reranker-v2-m3, what 2026-era cross-encoder rerankers handle Arabic well? Look at jina-reranker-v2, mxbai-rerank-large-v2, and any Arabic-specific.
    deliverable: Latency vs accuracy table, plug-in compatible with our retrieval_gate.
    tags: [retrieval, arabic]

  - id: graphrag_state_of_art
    priority: 75
    status: open
    question: What did Microsoft GraphRAG, LightRAG, HippoRAG-2, KAG, and other 2025-2026 graph-RAG papers conclude? We tested PPR negatively on QRCD — what other graph-traversal patterns have positive evidence?
    deliverable: 1-page taxonomy + which patterns we haven't tried yet that have strong evidence in single-hop benchmarks.
    tags: [retrieval, graph, neo4j]

