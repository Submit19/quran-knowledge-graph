# ── Source 4: Deep docs subsections we haven't crawled ────────────────────
# Specific Neo4j docs pages flagged during the initial crawl as worth deeper dives.
docs_neo4j_deep:
  description: Specific Neo4j docs subsections to deep-crawl
  handler: WebFetch
  source_priority: 50
  findings_file: data/research_neo4j_crawl/docs_deep_findings.md
  queue:
    - url: https://neo4j.com/docs/cypher-manual/current/queries/concepts/#search-clause
      title: Cypher 25 SEARCH syntax (replaces db.index.vector.queryNodes)
      relevance: HIGH — migration target; docs link surfaced in initial crawl
    - url: https://neo4j.com/docs/graph-data-science/current/algorithms/leiden/
      title: GDS Leiden algorithm
      relevance: HIGH — drop-in for Louvain (proposed task already exists)
    - url: https://neo4j.com/docs/graph-data-science/current/algorithms/fastrp/
      title: GDS FastRP node embeddings
      relevance: HIGH — proposed second retrieval channel (task in backlog)
    - url: https://neo4j.com/docs/graph-data-science/current/algorithms/knn/
      title: GDS K-Nearest Neighbors
      relevance: HIGH — pairs with FastRP for KNN-based retrieval
    - url: https://neo4j.com/docs/graph-data-science/current/algorithms/similarity/
      title: GDS Similarity catalog (Jaccard, Overlap, Cosine)
      relevance: MEDIUM — alternatives for RELATED_TO edge construction
    - url: https://neo4j.com/docs/cypher-manual/current/planning-and-tuning/query-tuning/
      title: Cypher query tuning guide
      relevance: HIGH — directly applicable to our latency outliers
    - url: https://neo4j.com/docs/cypher-manual/current/indexes/search-performance-indexes/index-hints/
      title: Cypher index hints
      relevance: MEDIUM — manual override when planner picks suboptimal index
    - url: https://neo4j.com/docs/operations-manual/current/monitoring/logging/
      title: Operations manual — logging
      relevance: MEDIUM — slow query log + metrics
    - url: https://neo4j.com/docs/apoc/current/overview/
      title: APOC procedures overview
      relevance: MEDIUM — many useful text/batch utilities
    - url: https://neo4j.com/docs/python-manual/current/concurrent-transactions/
      title: Python driver concurrent transactions
      relevance: LOW-MEDIUM — useful for batch writes in reasoning_memory

# ── Source 5: Community forum (manual surfacing only) ─────────────────────
# Neo4j Discourse forum. Unbounded scrape would be wasteful. Recommendation:
# loop adds high-quality threads here ad-hoc when they surface from other research.
community_neo4j:
  description: Neo4j Discourse forum (community.neo4j.com)
  handler: WebFetch
  source_priority: 30
  findings_file: data/research_neo4j_crawl/community_findings.md
  note: |
    Discourse forum has thousands of threads. Systematic scrape is wasteful.
    Approach: as a research tick discovers a question that might have a
    community answer, search community.neo4j.com (via WebSearch with
    site:community.neo4j.com) and append the most relevant 1-3 threads here
    for follow-up. The loop should NOT eagerly enumerate this source.
  queue: []

# ── Notes for the loop ────────────────────────────────────────────────────
# When a research tick fires:
# 1. Read this file. Find the highest-priority source with a non-empty queue.
# 2. Pop the first item from that source's queue.
# 3. Process it (fetch transcript / WebFetch / etc.).
# 4. Extract QKG-relevant findings into the source's findings_file.
# 5. If actionable: propose a from_<source>_<short> task in ralph_backlog.yaml.
# 6. Save the queue YAML back (with the popped item removed).
# 7. Commit and push.
#
# When all source queues are empty: mark `neo4j_yt_channel_iterator` topic
# in research_backlog.yaml as status: done, and the loop will move on to
# other open research topics.
