# Ralph Loop — Backlog
#
# A ranked queue of small, atomic tasks. Each tick picks the highest-priority
# unblocked task, runs it, measures impact, commits if improved, logs what
# was learned, and updates this file with discovered follow-ups.
#
# Edit by hand at any time. Format:
#   id          — unique snake_case
#   type        — eval | prompt_variant | cypher_analysis | cache_op
#                  | embed_op | agent_creative | cleanup | manual | external_run
#   priority    — 0..100, higher = run sooner
#   description — one line, human-readable
#   blockers    — list of other task ids this depends on (must be done first)
#   spec        — task-type-specific config (varies)
#   notes       — anything else
#
# Status: tasks land in ralph_state.json once executed (done | failed | skipped)

version: 1
default_baseline_eval: data/eval_v1_results.json
default_baseline_metric: avg_unique_cites_per_q   # currently 43.6 (v2 prompt)

# snarktank/ralph signals <promise>COMPLETE</promise> when prd.json all-passes.
# Our equivalent: ralph_run.py exits 0 when these criteria are met.
project_completion:
  all_tasks_done: true            # every non-skipped, non-quarantined task is done
  ignore_quarantined: true        # quarantined tasks don't block completion
  ignore_skipped: true            # manual / external_run skips don't block
  min_metric:
    name: avg_unique_cites_per_q
    eval: data/eval_v1_results.json
    value: 50.0                   # current is 43.6 (v2); 50 is the target
  # require_files: []             # add files you want to exist for completion

tasks:
  # ── Eval-driven (answer quality) ───────────────────────────────────────────
  - id: rerun_eval_against_current
    type: eval
    priority: 95
    description: "Run eval_v1.py vs current code+prompt, snapshot to data/eval_<ts>.json"
    blockers: []
    spec:
      script: eval_v1.py
      env: {SEMANTIC_SEARCH_INDEX: verse_embedding_m3, RERANKER_MODEL: BAAI/bge-reranker-v2-m3}
      compare_to: data/eval_v1_results.json
      metric: avg_unique_cites_per_q
      regression_pct: 5  # if current is >5% worse than baseline, flag
      max_attempts: 2
      acceptance:
        - file_exists: data/eval_v1_results.json
        - file_min_bytes: {path: data/eval_v1_results.json, min: 50000}
        - python: "result.metric_after is not None and result.metric_after > 25"

  - id: add_5_targeted_eval_questions
    type: agent_creative
    priority: 90
    description: "Add 5 questions to eval that exercise hybrid_search / run_cypher / get_code19_features / recall_similar_query"
    blockers: []
    spec:
      max_attempts: 2
      max_tokens: 1500
      target_file: eval_v1.py
      add_to_constant: QUESTIONS_TARGETED
      acceptance:
        - file_exists: data/ralph_agent_add_5_targeted_eval_questions.md
        - file_min_bytes: {path: data/ralph_agent_add_5_targeted_eval_questions.md, min: 400}
      proposals:
        - "How many times does the letter Qaf appear in Surah Qaf? (forces get_code19_features)"
        - "How many verses mention Abraham across all surahs? (forces run_cypher aggregation)"
        - "Find verses containing the word 'kawthar'. (forces hybrid_search BM25 path)"
        - "What was the previous question about? (placeholder — requires conversational mode; skip if /chat is stateless)"
        - "Compare verses about the people of Lot in Surahs 7, 11, 26, and 27. (multi-surah cross-reference; tests traversal depth)"
      deliverable: |
        Output a Python list literal of 5 question strings, ready to paste into
        the QUESTIONS_TARGETED constant in eval_v1.py. Use the proposals above as
        a starting point but refine for clarity. Each question must clearly target
        one of: get_code19_features, run_cypher, hybrid_search, concept_search,
        or multi-hop traversal. Output exactly:

        QUESTIONS_TARGETED = [
            "...",
            "...",
            "...",
            "...",
            "...",
        ]

        Nothing else.

  - id: hand_grade_26_answers
    type: manual
    priority: 88
    description: "User to grade v1 vs v2 answer pairs (5/5 fidelity), 26 answers, ~2hrs"
    blockers: []
    notes: "Skipped by automated ticker. User invokes manually. Output goes to data/eval_handgrade.json."

  - id: rerun_eval_track_per_question_delta
    type: cypher_analysis
    priority: 70
    description: "Compare v1 vs v2 per-question and identify the 3 that improved most + 3 that regressed (if any). Use to focus prompt-variant tasks."
    blockers: []
    spec:
      query_kind: python_script
      acceptance:
        - file_exists: data/ralph_analysis_rerun_eval_track_per_question_delta.md
        - file_min_bytes: {path: data/ralph_analysis_rerun_eval_track_per_question_delta.md, min: 200}
      script: |
        import json
        v1 = json.load(open('data/eval_v1_baseline.json', encoding='utf-8'))
        v2 = json.load(open('data/eval_v1_results.json', encoding='utf-8'))
        rows = []
        for batch in ('general', 'surah'):
            for a, b in zip(v1.get(batch, []), v2.get(batch, [])):
                if a.get('question') != b.get('question'): continue
                rows.append({
                    'question': a['question'],
                    'cites_delta': b.get('n_cites_unique', 0) - a.get('n_cites_unique', 0),
                    'time_delta': b.get('elapsed_sec', 0) - a.get('elapsed_sec', 0),
                    'tool_delta': b.get('n_tool_calls', 0) - a.get('n_tool_calls', 0),
                })
        rows.sort(key=lambda r: -r['cites_delta'])
        print('=== Top improvements ===')
        for r in rows[:3]: print(f"  +{r['cites_delta']:>3} cites  +{r['time_delta']:>4.0f}s  '{r['question'][:60]}'")
        print('\n=== Bottom (regressions) ===')
        for r in rows[-3:]: print(f"  {r['cites_delta']:>+3} cites  {r['time_delta']:>+4.0f}s  '{r['question'][:60]}'")

  # ── Architecture / cache hygiene ───────────────────────────────────────────
  - id: refresh_query_embedding_to_bge_m3
    type: embed_op
    priority: 85
    description: "Re-embed (:Query) nodes with BGE-M3 so HippoRAG past-query seeds aren't garbage on Arabic"
    blockers: []
    spec:
      target: Query.textEmbedding
      from_model: all-MiniLM-L6-v2
      to_model: BAAI/bge-m3
      new_index: query_embedding_m3
      keep_legacy: true  # don't drop old index — keep both
      script_to_write: backfill_query_embeddings_m3.py

  - id: refresh_answer_cache_through_new_pipeline
    type: cache_op
    priority: 80
    description: "Re-embed answer_cache.json keys with BGE-M3 so cache hits align with semantic_search index"
    blockers: []
    spec:
      target: data/answer_cache.json (entry.embedding field)
      from_model: all-MiniLM-L6-v2
      to_model: BAAI/bge-m3
      backup_first: data/answer_cache.pre-m3-rekey.bak.json
      script_to_write: rekey_answer_cache_m3.py

  - id: try_lower_max_tool_turns
    type: prompt_variant
    priority: 75
    description: "Lower MAX_TOOL_TURNS from 8 to 5; rerun eval; commit if no regression"
    blockers: [rerun_eval_against_current]
    spec:
      file: app_free.py
      change: "MAX_TOOL_TURNS = 5"
      restart_required: true
      compare_to_baseline: true

  - id: cypher_retry_metric
    type: prompt_variant
    priority: 60
    description: "Surface tool retry count + first-error class as SSE metadata; logs per-response in eval"
    blockers: []
    spec:
      file: chat.py
      surface_via: SSE event 'tool' adds 'retries' field
      eval_field: tool_retries
      restart_required: true

  # ── Data-layer / RETRIEVED-edge driven ─────────────────────────────────────
  - id: analyze_retrieved_edges_top_per_tool
    type: cypher_analysis
    priority: 65
    description: "For each tool, what verses does it retrieve most? Surfaces tool-quality gradients"
    blockers: []
    spec:
      acceptance:
        - file_exists: data/ralph_analysis_analyze_retrieved_edges_top_per_tool.md
        - file_min_bytes: {path: data/ralph_analysis_analyze_retrieved_edges_top_per_tool.md, min: 100}
      query: |
        MATCH ()-[r:RETRIEVED]->(v:Verse)
        WITH r.tool AS tool, v.verseId AS vid, count(*) AS n
        ORDER BY tool, n DESC
        RETURN tool, collect({vid: vid, n: n})[0..5] AS top5

  - id: build_biased_search_tool
    type: prompt_variant
    priority: 55
    description: "tool_biased_search uses RETRIEVED edge counts to boost frequently-good verses (Eifrem #4-B)"
    blockers: [analyze_retrieved_edges_top_per_tool, refresh_query_embedding_to_bge_m3]
    spec:
      file: chat.py
      tool_name: biased_search
      logic: |
        Hybrid_search top-K seeds, then re-rank by:
          score' = alpha * cosine + beta * log(1 + retrieved_count_for_similar_past_queries)

  # ── HippoRAG / multi-hop ───────────────────────────────────────────────────
  - id: rerun_hipporag_after_query_reembed
    type: eval
    priority: 65
    description: "After Query embeddings refreshed to BGE-M3, re-run hipporag QRCD eval. Original failed because past-query seed was MiniLM noise vs Arabic queries."
    blockers: [refresh_query_embedding_to_bge_m3]
    spec:
      script: eval_qrcd_hipporag.py
      compare_to: data/qrcd_hipporag_compare.json

  - id: build_multihop_benchmark
    type: agent_creative
    priority: 50
    description: "Hand-curate 30 multi-hop Quran questions; gold = required verse traversal path. Strategic — gates whether ANY graph method beats vector RAG."
    blockers: []
    spec:
      target: data/multihop_bench.jsonl
      example: |
        {"question": "Find verses that share Arabic root with 14:24 but are about prophets",
         "gold_path": ["root: ك ل م", "verses with that root", "filter: about prophets"]}

  # ── UX / observability ─────────────────────────────────────────────────────
  - id: surface_top_retrieved_verses_in_3d_viz
    type: prompt_variant
    priority: 45
    description: "Mark hub-by-retrieval verses with a halo in index.html"
    blockers: [analyze_retrieved_edges_top_per_tool]
    spec:
      file: index.html
      data_source: data/graph_stats.json + RETRIEVED-counts query

  - id: bootstrap_tools_py
    type: agent_creative
    priority: 35
    description: "Schema-to-tool stub generator (Aura Agent inspiration). Useful when adding a new corpus (Hadith, Tafsir)."
    blockers: []
    spec:
      output: bootstrap_tools.py
      input: db.schema.visualization() + use-case prompt from pipeline_config.yaml

  # ── Speed / latency focus ──────────────────────────────────────────────────
  - id: measure_per_tool_latency
    type: cypher_analysis
    priority: 78
    description: "Aggregate ToolCall.duration_ms per tool_name from reasoning_memory; surface the slow tools"
    blockers: []
    spec:
      acceptance:
        - file_exists: data/ralph_analysis_measure_per_tool_latency.md
        - file_min_bytes: {path: data/ralph_analysis_measure_per_tool_latency.md, min: 200}
      query: |
        MATCH ()-[:HAS_STEP]->(tc:ToolCall)
        WHERE tc.duration_ms IS NOT NULL AND tc.tool_name IS NOT NULL
        WITH tc.tool_name AS tool, tc.duration_ms AS ms
        RETURN tool,
               count(*) AS n_calls,
               round(avg(ms)) AS avg_ms,
               round(percentileCont(ms, 0.5)) AS p50_ms,
               round(percentileCont(ms, 0.95)) AS p95_ms,
               round(max(ms)) AS max_ms,
               sum(ms) AS total_ms
        ORDER BY total_ms DESC

  - id: measure_cache_hit_rate
    type: cypher_analysis
    priority: 76
    description: "What % of past Queries hit the answer cache vs ran full agent loop?"
    blockers: []
    spec:
      acceptance:
        - file_exists: data/ralph_analysis_measure_cache_hit_rate.md
        - file_min_bytes: {path: data/ralph_analysis_measure_cache_hit_rate.md, min: 100}
      query: |
        MATCH (q:Query)-[:TRIGGERED]->(t:ReasoningTrace)
        OPTIONAL MATCH (t)-[:HAS_STEP]->(tc:ToolCall)
        WITH t, count(tc) AS n_steps
        RETURN
          count(t) AS total_traces,
          sum(CASE WHEN n_steps = 0 THEN 1 ELSE 0 END) AS cache_likely_hits,
          sum(CASE WHEN n_steps > 0 THEN 1 ELSE 0 END) AS full_runs,
          round(toFloat(sum(CASE WHEN n_steps = 0 THEN 1 ELSE 0 END)) /
                count(t) * 100, 1) AS cache_hit_pct

  - id: propose_speed_tunings
    type: agent_creative
    priority: 73
    description: "Given the cache-hit-rate + per-tool-latency analyses, propose 3-5 concrete tuning changes (env vars, MAX_TOOL_TURNS, tool-call cache TTL, reranker on/off). Output: a doc with rationale + expected delta."
    blockers: [measure_per_tool_latency, measure_cache_hit_rate]
    spec:
      max_attempts: 2
      max_tokens: 1500
      acceptance:
        - file_exists: data/ralph_agent_propose_speed_tunings.md
        - file_min_bytes: {path: data/ralph_agent_propose_speed_tunings.md, min: 600}
      deliverable: |
        Read the per-tool-latency analysis and the cache-hit-rate analysis
        (both already produced as data/ralph_analysis_*.md by prior tasks).
        Propose 3-5 concrete tuning changes that would reduce avg latency
        per /chat without sacrificing answer quality. Each proposal must
        include:
          1. The change (env var, code line, config edit)
          2. The mechanism (why it would speed things up)
          3. The risk (what it could break)
          4. The validation plan (which eval metric to watch)
        Format as a numbered markdown list.

  - id: measure_reranker_speed_vs_quality
    type: cleanup
    priority: 70
    description: "Run eval twice — once with reranker on, once with RERANK_DISABLED=1 — compare time + cite-density"
    blockers: []
    notes: "Stub — needs a custom executor that runs the eval twice with different env. For now, picks SKIPPED unless promoted to a manual flow."
    spec:
      acceptance:
        - python: "True"   # placeholder until proper executor lands

  # ── UI/UX proposals (loop produces specs; human applies in foreground) ─────
  - id: propose_streaming_progress_indicator
    type: agent_creative
    priority: 72
    description: "Spec a UI affordance that shows which tool is currently running during /chat (we already emit SSE 'tool' events). Output: a markdown doc with HTML/JS sketch + which lines of index.html to change."
    blockers: []
    spec:
      max_attempts: 2
      max_tokens: 2000
      acceptance:
        - file_exists: data/ralph_agent_propose_streaming_progress_indicator.md
        - file_min_bytes: {path: data/ralph_agent_propose_streaming_progress_indicator.md, min: 800}
      context: |
        The /chat endpoint streams SSE events. Event types we emit:
          'tool'          -> {name, args, summary} — fired before each tool call
          'text'          -> {d: <markdown delta>}
          'graph_update'  -> {nodes, links}
          'verification'  -> {citation_precision, total_claims, supported}
          'done'          -> {verses}
          'error'         -> {d}
        Currently index.html shows nothing while the agent is running; the
        user just sees a spinner. We want a tool-by-tool progress bar that
        updates as 'tool' events arrive (e.g. "1/5 search_keyword 'patience'"
        → "2/5 hybrid_search ...").
      deliverable: |
        Output a markdown spec with:
          1. Visual mock (ASCII-art or HTML structure).
          2. Specific HTML/CSS/JS additions to index.html.
          3. State machine: how tool events update which DOM nodes.
          4. Edge cases (cache hit = no tools fire, error mid-stream, ≥10 tools).
          5. Estimated implementation effort in lines of code.

  - id: propose_citation_tooltip_v2
    type: agent_creative
    priority: 68
    description: "Spec an improved citation hover tooltip — show Arabic + English, cross-references, 'explore' button. Output: HTML/CSS sketch + diff against current index.html."
    blockers: []
    spec:
      max_attempts: 2
      max_tokens: 1800
      acceptance:
        - file_exists: data/ralph_agent_propose_citation_tooltip_v2.md
        - file_min_bytes: {path: data/ralph_agent_propose_citation_tooltip_v2.md, min: 700}
      context: |
        Today: hovering [2:255] in a chat answer shows a small floating div
        with the English text only. Wanted: bilingual (Arabic with proper RTL
        + English), 1-line surah header, "explore in graph" deep link, click
        to pin (avoid disappearing tooltip).
      deliverable: |
        Spec doc: visual mock + the tooltip HTML structure + how it pulls
        Arabic text (we already have v.arabicText on Verse nodes; the /chat
        'done' event includes verse texts). Note any backend changes needed.

  - id: propose_session_memory_ux
    type: agent_creative
    priority: 64
    description: "Today /chat is stateless — every message starts fresh. Spec a session-memory UX that lets the user say 'explain that further' or 'what about in Surah 2'."
    blockers: []
    spec:
      max_attempts: 2
      max_tokens: 1800
      acceptance:
        - file_exists: data/ralph_agent_propose_session_memory_ux.md
        - file_min_bytes: {path: data/ralph_agent_propose_session_memory_ux.md, min: 700}
      context: |
        Backend: the /chat handler already accepts a `history` field but the
        index.html only sends [] (empty). Frontend always passes empty. We
        need: a "session" concept on the client (in-memory or localStorage),
        the last N turns shipped on each /chat, and UI affordances to start
        a new session vs continue.
      deliverable: |
        Spec: data model (what's stored per session), UI changes to
        index.html (sidebar of past turns, "new conversation" button),
        transport (request shape with history), eviction (when does old
        history age out?), and how it interacts with the answer cache
        (probably: skip cache when history > 0).

  - id: propose_search_bar_autocomplete
    type: agent_creative
    priority: 62
    description: "Spec a search bar that autocompletes via concept_search as the user types"
    blockers: []
    spec:
      max_attempts: 2
      max_tokens: 1500
      acceptance:
        - file_exists: data/ralph_agent_propose_search_bar_autocomplete.md
        - file_min_bytes: {path: data/ralph_agent_propose_search_bar_autocomplete.md, min: 600}
      context: |
        We have concept_search returning canonical concepts + their surface
        variants. Bind it to a search bar: type "forg" → suggest concept
        "forgive (forgive/forgiver/forgiveness, 225 verses)". Click → load
        verses for that concept.
      deliverable: |
        Spec: where the search bar sits in index.html, debounce timing,
        endpoint to call (we may need a thin /api/concept_suggest), UX
        for empty-state and no-results.

  # ── Self-discovery (loop generates new backlog entries) ───────────────────
  - id: surface_underperforming_questions
    type: cypher_analysis
    priority: 60
    description: "Find questions in the eval where citation density is lowest — surface candidates for prompt tuning"
    blockers: []
    spec:
      acceptance:
        - file_exists: data/ralph_analysis_surface_underperforming_questions.md
        - file_min_bytes: {path: data/ralph_analysis_surface_underperforming_questions.md, min: 200}
      query_kind: python_script
      script: |
        import json
        d = json.load(open('data/eval_v1_results.json', encoding='utf-8'))
        rows = (d.get('general') or []) + (d.get('surah') or [])
        rows.sort(key=lambda r: r.get('n_cites_unique', 0))
        print('=== Bottom 5 by citation density ===')
        for r in rows[:5]:
            print(f"  {r.get('n_cites_unique', 0):>3} cites  {r.get('elapsed_sec', 0):>5.0f}s  '{r.get('question', '')[:65]}'")
            tcb = r.get('tool_call_breakdown') or {}
            print(f"    tools: {tcb}")
        print('\n=== Top 5 by citation density ===')
        for r in rows[-5:][::-1]:
            print(f"  {r.get('n_cites_unique', 0):>3} cites  {r.get('elapsed_sec', 0):>5.0f}s  '{r.get('question', '')[:65]}'")

  - id: surface_retrieval_noise
    type: cypher_analysis
    priority: 58
    description: "Verses retrieved often by tools but rarely cited in final answers — these are retrieval noise candidates"
    blockers: []
    spec:
      acceptance:
        - file_exists: data/ralph_analysis_surface_retrieval_noise.md
        - file_min_bytes: {path: data/ralph_analysis_surface_retrieval_noise.md, min: 150}
      query: |
        MATCH (t:ReasoningTrace)-[:RETRIEVED]->(v:Verse)
        WITH v, count(DISTINCT t) AS n_retrieved
        OPTIONAL MATCH (q:Query)-[:PRODUCED]->(a:Answer)
        WHERE v.verseId IN coalesce(a.cited_verses, [])
        WITH v.verseId AS vid, n_retrieved, count(DISTINCT a) AS n_cited
        WHERE n_retrieved >= 3
        WITH vid, n_retrieved, n_cited,
             toFloat(n_cited) / n_retrieved AS cite_ratio
        ORDER BY cite_ratio ASC, n_retrieved DESC
        LIMIT 25
        RETURN vid, n_retrieved, n_cited, round(cite_ratio, 3) AS cite_ratio

  - id: discover_new_followups
    type: agent_creative
    priority: 55
    description: "Read all data/ralph_analysis_*.md + data/eval_v1_results.json. Propose 3-7 NEW backlog tasks the loop should run. Output is a YAML fragment for review."
    blockers: [surface_underperforming_questions, surface_retrieval_noise, measure_per_tool_latency, measure_cache_hit_rate]
    spec:
      max_attempts: 2
      max_tokens: 2500
      acceptance:
        - file_exists: data/ralph_proposed_tasks.yaml
        - file_min_bytes: {path: data/ralph_proposed_tasks.yaml, min: 400}
      context: |
        You are the loop's self-improvement subagent. Your job is to find
        gaps the human would have missed. Look at:
          - data/ralph_analysis_*.md (all analysis outputs so far)
          - data/eval_v1_results.json (current answer-quality baseline)
          - data/ralph_log.md (Codebase Patterns block + tick history)
        Then propose 3-7 NEW backlog tasks targeting:
          (a) the lowest-citation-density questions (specific prompt tweaks)
          (b) tools with the highest p95 latency or 0-citation-yield rates
          (c) retrieval-noise verses (high retrieved, low cited)
          (d) UI/UX cracks the user has not yet flagged
          (e) anything in the analyses that obviously deserves a follow-up
      deliverable: |
        Output a SINGLE YAML fragment (no preamble, no commentary) shaped
        like the existing ralph_backlog.yaml task entries. Save it to
        data/ralph_proposed_tasks.yaml. The human will review and merge
        into the main backlog.

        Format (strict — must parse as YAML):

        proposed_at: "2026-05-08T..."
        rationale: "One paragraph explaining what data you saw and what you concluded."
        tasks:
          - id: descriptive_snake_case
            type: eval | cypher_analysis | agent_creative | cleanup
            priority: 0..100
            description: "one line"
            blockers: []
            spec:
              acceptance:
                - file_exists: data/...
              # plus type-specific spec fields

  # ── Cleanup hygiene (always-low-priority background) ──────────────────────
  - id: append_ralph_status_to_AUTONOMOUS_RUN
    type: cleanup
    priority: 10
    description: "After each tick, append a one-line status to AUTONOMOUS_RUN_2026-04-28.md or a new RALPH_LOG.md"
    blockers: []
    spec: {}
