      color: #64748b; text-decoration: none; border: 1px solid transparent;
      transition: all 0.15s;
    }
    #header-tabs .tab:hover { color: #94a3b8; border-color: #1e293b; }
    #header-tabs .tab.active { color: #10b981; border-color: #10b981; background: rgba(16,185,129,0.08); }

    /* ── filter panel ── */
    .filter-panel {
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid #1e293b;
      background: #0a0f1a;
    }
    .filter-panel label { font-size: 0.82em; font-weight: 600; color: #94a3b8; }

      background: #0f172a;
      color: #cbd5e1;
      border: 1px solid #1e293b;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.82em;
      cursor: pointer;
    }
    .filter-panel select:focus { outline: none; border-color: #10b981; }
    .result-count {
      font-size: 0.8em;
      color: #64748b;
      margin-left: auto;
    }

    /* ── main ── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .main-content::-webkit-scrollbar { width: 4px; }
    .main-content::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    .tension-card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }
    .card-header {
      padding: 12px 18px;

      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1e293b;
      gap: 12px;
    }

      font-size: 0.85em;
      font-weight: 700;
      color: #e2e8f0;
    }
    .card-header .refs span { color: #64748b; font-weight: 400; }

    .badge {
      font-size: 0.68em;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .badge-conditional_tension    { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .badge-scope_tension          { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .badge-apparent_contradiction { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }

    /* score bar */
    .score-section {
      padding: 8px 18px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .score-label {
      font-size: 0.72em;
      color: #64748b;
      min-width: 45px;
    }
    .score-bar {
      flex: 1;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #10b981, #3b82f6);
      transition: width 0.4s ease;
    }
    .score-val {
      font-size: 0.78em;
      font-weight: 700;
      color: #10b981;
      min-width: 36px;
      text-align: right;
    }

    /* side-by-side */
    .verses-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }
    .verse-col {
      padding: 16px 18px;
    }
    .verse-col:first-child {
      border-right: 1px solid #1e293b;
    }
    .verse-col .surah-label {
      font-size: 0.7em;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .verse-col .verse-text {
      font-size: 0.88em;
      line-height: 1.65;
      color: #e2e8f0;
    }

    .verse-text .opp {
      background: rgba(239,68,68,0.2);
      color: #fca5a5;
      border-radius: 2px;
      padding: 0 2px;
    }

      border-top: 1px solid #1e293b;

      flex-wrap: wrap;
      gap: 8px;

function highlightOpposites(text, oppWords) {
  if (!oppWords.length) return text;
  const allOpp = new Set(oppWords.flat().map(w => w.toLowerCase()));
  return text.split(/(\s+)/).map(token => {
    const clean = token.toLowerCase().replace(/[^a-z]/g, '');
    if (clean && allOpp.has(clean)) {
      return `<span class="opp">${token}</span>`;
    }
    return token;
  }).join('');
}

  }

  data.sort((a, b) => {
    if (sortBy === 'score') return b.score - a.score;
    if (sortBy === 'keyword_overlap') return b.keyword_overlap - a.keyword_overlap;
    if (sortBy === 'sentiment_divergence') return b.sentiment_divergence - a.sentiment_divergence;
    return 0;
  });

  document.getElementById('result-count').textContent = `${data.length} tension${data.length !== 1 ? 's' : ''}`;

  if (!data.length) {
    container.innerHTML = '<div class="empty-state">No tensions match the selected filter.</div>';
    return;
  }

  container.innerHTML = data.map(t => {
    const oppWords = t.opposite_pairs || [];
    const hlA = highlightOpposites(t.text_a, oppWords);
    const hlB = highlightOpposites(t.text_b, oppWords);
    const scorePct = Math.min(100, t.score);
    const badgeClass = `badge-${t.primary_type}`;
    const typeLabel = TYPE_LABELS[t.primary_type] || t.primary_type;

    return `
      <div class="tension-card">
        <div class="card-header">
          <div class="refs">
            ${t.verse_a} <span>(${t.surah_a})</span>
            &nbsp;&harr;&nbsp;
            ${t.verse_b} <span>(${t.surah_b})</span>
          </div>
          <span class="badge ${badgeClass}">${typeLabel}</span>
        </div>
        <div class="score-section">
          <span class="score-label">Score</span>
          <div class="score-bar"><div class="score-bar-fill" style="width:${scorePct}%"></div></div>
          <span class="score-val">${t.score.toFixed(1)}</span>
        </div>
        <div class="verses-row">
          <div class="verse-col">
            <div class="surah-label">${t.verse_a} &mdash; ${t.surah_a}</div>
            <div class="verse-text">${hlA}</div>
          </div>
          <div class="verse-col">
            <div class="surah-label">${t.verse_b} &mdash; ${t.surah_b}</div>
            <div class="verse-text">${hlB}</div>
          </div>
        </div>
        <div class="card-footer">
          ${t.shared_keywords.length ? `
            <div class="footer-group">
              <span class="label">Keywords:</span>
              ${t.shared_keywords.map(k => `<span class="kw-pill">${k}</span>`).join('')}
            </div>` : ''}
          ${oppWords.length ? `
            <div class="footer-group">
              <span class="label">Opposites:</span>
              ${oppWords.map(p => `<span class="opp-pill">${p[0]} / ${p[1]}</span>`).join('')}
            </div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// Try API, fall back to embedded
async function loadTensions() {
  const typeFilter = document.getElementById('type-filter').value;
  try {
    const url = typeFilter === 'all'
      ? '/api/explorer/tensions'
      : `/api/explorer/tensions?type=${encodeURIComponent(typeFilter)}`;
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      if (data.tensions && data.tensions.length) {
        // merge with embedded, preferring API
        // For now just render embedded
      }
    }
  } catch(e) { /* use embedded */ }
  renderTensions();
}

document.getElementById('type-filter').addEventListener('change', loadTensions);
document.getElementById('sort-select').addEventListener('change', renderTensions);

loadTensions();
</script>
</body>
</html>
